<!-- AL METHER PILOT SECURITY CORE -->

<script>

/* =========================
   AL METHER CORE ENGINE
========================= */

const STORE_CONFIG = {
  brand: "SKX",
  storeCode: "M085",
  storeName: "Skechers M085",
  lat: 38.4237,
  lng: 27.1428,
  allowedRadius: 120
};

let activeUsers = JSON.parse(localStorage.getItem("activeUsers")) || [];
let logs = JSON.parse(localStorage.getItem("logs")) || [];
let suspiciousLogs = JSON.parse(localStorage.getItem("suspiciousLogs")) || [];

/* =========================
   DEVICE ENGINE
========================= */

function getDeviceId() {

  let deviceId = localStorage.getItem("deviceId");

  if (!deviceId) {

    deviceId =
      "DEV-" +
      Math.random().toString(36).substring(2, 10);

    localStorage.setItem("deviceId", deviceId);
  }

  return deviceId;
}

/* =========================
   GPS ENGINE
========================= */

function calculateDistance(lat1, lon1, lat2, lon2) {

  const R = 6371e3;

  const f1 = lat1 * Math.PI / 180;
  const f2 = lat2 * Math.PI / 180;

  const df = (lat2-lat1) * Math.PI / 180;
  const dl = (lon2-lon1) * Math.PI / 180;

  const a =
    Math.sin(df/2) * Math.sin(df/2) +
    Math.cos(f1) *
    Math.cos(f2) *
    Math.sin(dl/2) *
    Math.sin(dl/2);

  const c =
    2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

function checkStoreLocation(userLat, userLng) {

  const distance = calculateDistance(
    userLat,
    userLng,
    STORE_CONFIG.lat,
    STORE_CONFIG.lng
  );

  return distance <= STORE_CONFIG.allowedRadius;
}

/* =========================
   AI EVENT ENGINE
========================= */

function createEvent(type, personCode, details) {

  const event = {
    type,
    personCode,
    details,
    store: STORE_CONFIG.storeCode,
    brand: STORE_CONFIG.brand,
    time: new Date().toLocaleString(),
  };

  logs.unshift(event);

  localStorage.setItem(
    "logs",
    JSON.stringify(logs)
  );

  renderLogs();
}

/* =========================
   SECURITY ENGINE
========================= */

function suspiciousLogin(personCode, reason) {

  const event = {
    type: "SUSPICIOUS_LOGIN",
    personCode,
    reason,
    store: STORE_CONFIG.storeCode,
    time: new Date().toLocaleString()
  };

  suspiciousLogs.unshift(event);

  localStorage.setItem(
    "suspiciousLogs",
    JSON.stringify(suspiciousLogs)
  );

  createEvent(
    "SUSPICIOUS_LOGIN",
    personCode,
    reason
  );

  alert(
    "⚠️ Şüpheli giriş tespit edildi!\n\n" +
    reason
  );
}

/* =========================
   PERSON LOGIN
========================= */

function personLogin() {

  const code =
    document.getElementById("personCode").value;

  if (!code) {

    alert("Personel kodu gir");
    return;
  }

  navigator.geolocation.getCurrentPosition(

    (position) => {

      const userLat = position.coords.latitude;
      const userLng = position.coords.longitude;

      const insideStore =
        checkStoreLocation(userLat, userLng);

      const deviceId = getDeviceId();

      if (!insideStore) {

        suspiciousLogin(
          code,
          "Mağaza dışında giriş denemesi"
        );

        return;
      }

      const already =
        activeUsers.find(
          u => u.code === code
        );

      if (already) {

        suspiciousLogin(
          code,
          "Aynı kullanıcı tekrar giriş yaptı"
        );

        return;
      }

      activeUsers.push({
        code,
        deviceId,
        loginTime: new Date().toLocaleString(),
        status: "ACTIVE",
        breakMinutes: 0
      });

      localStorage.setItem(
        "activeUsers",
        JSON.stringify(activeUsers)
      );

      createEvent(
        "SHIFT_START",
        code,
        "Personel giriş yaptı"
      );

      renderUsers();
      updateCounters();

      alert("✅ Giriş başarılı");

    },

    () => {

      alert(
        "❌ Konum izni gerekli"
      );
    }

  );
}

/* =========================
   BREAK ENGINE
========================= */

function startBreak(minutes) {

  const code =
    document.getElementById("personCode").value;

  const user =
    activeUsers.find(
      u => u.code === code
    );

  if (!user) {

    alert("Aktif personel yok");
    return;
  }

  user.status = "BREAK";
  user.breakMinutes = minutes;

  localStorage.setItem(
    "activeUsers",
    JSON.stringify(activeUsers)
  );

  createEvent(
    "BREAK_START",
    code,
    minutes + " dk mola başladı"
  );

  renderUsers();
  updateCounters();

  alert(
    "☕ " + minutes +
    " dk mola başladı"
  );
}

function endBreak() {

  const code =
    document.getElementById("personCode").value;

  const user =
    activeUsers.find(
      u => u.code === code
    );

  if (!user) {

    alert("Personel bulunamadı");
    return;
  }

  user.status = "ACTIVE";

  createEvent(
    "BREAK_END",
    code,
    "Mola bitti"
  );

  localStorage.setItem(
    "activeUsers",
    JSON.stringify(activeUsers)
  );

  renderUsers();
  updateCounters();

  alert("✅ Mola bitti");
}

/* =========================
   EXIT ENGINE
========================= */

function exitShift() {

  const code =
    document.getElementById("personCode").value;

  activeUsers =
    activeUsers.filter(
      u => u.code !== code
    );

  localStorage.setItem(
    "activeUsers",
    JSON.stringify(activeUsers)
  );

  createEvent(
    "SHIFT_END",
    code,
    "Çıkış yaptı"
  );

  renderUsers();
  updateCounters();

  alert("👋 Çıkış yapıldı");
}

/* =========================
   COUNTERS
========================= */

function updateCounters() {

  const active =
    activeUsers.filter(
      u => u.status === "ACTIVE"
    ).length;

  const breaks =
    activeUsers.filter(
      u => u.status === "BREAK"
    ).length;

  document.getElementById(
    "activeCount"
  ).innerText = active;

  document.getElementById(
    "breakCount"
  ).innerText = breaks;

  document.getElementById(
    "exitCount"
  ).innerText = logs.filter(
    l => l.type === "SHIFT_END"
  ).length;
}

/* =========================
   LIVE LOGS
========================= */

function renderLogs() {

  const area =
    document.getElementById("liveLogs");

  if (!area) return;

  area.innerHTML = "";

  logs.slice(0, 20).forEach(log => {

    const div =
      document.createElement("div");

    div.className = "logItem";

    div.innerHTML = `
      <b>${log.type}</b><br>
      ${log.personCode}<br>
      ${log.details}<br>
      <small>${log.time}</small>
    `;

    area.appendChild(div);

  });
}

/* =========================
   ACTIVE USERS
========================= */

function renderUsers() {

  const area =
    document.getElementById("activeArea");

  if (!area) return;

  area.innerHTML = "";

  activeUsers.forEach(user => {

    const div =
      document.createElement("div");

    div.className = "userCard";

    div.innerHTML = `
      <h3>${user.code}</h3>
      <p>${user.status}</p>
      <small>${user.loginTime}</small>
    `;

    area.appendChild(div);

  });
}

/* =========================
   INIT
========================= */

window.onload = () => {

  renderUsers();
  renderLogs();
  updateCounters();
};

</script>
