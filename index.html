<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AL Mether Workforce</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
background:#020b2d;
color:white;
}

.container{
padding:15px;
max-width:500px;
margin:auto;
}

.logo{
text-align:center;
margin-top:20px;
}

.logo h1{
font-size:52px;
margin:0;
color:#39b5ff;
}

.logo p{
color:#aaa;
margin-top:5px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:24px;
font-weight:bold;
margin-top:15px;
color:white;
}

.managerBtn{
background:#2f65ff;
}

.personBtn{
background:#16c34a;
}

.card{
background:#07143d;
padding:15px;
border-radius:20px;
margin-top:20px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:#091738;
color:white;
font-size:20px;
margin-top:10px;
box-sizing:border-box;
}

.breakButtons{
display:flex;
gap:10px;
margin-top:15px;
}

.breakButtons button{
flex:1;
padding:14px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:white;
}

.b15{
background:#e0a000;
}

.b30{
background:#ff8800;
}

.b45{
background:#ff4d4d;
}

.exitBtn{
background:#ff2b4d;
margin-top:15px;
}

.counterArea{
display:flex;
gap:10px;
margin-top:20px;
}

.counter{
flex:1;
padding:20px;
border-radius:20px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.green{
background:#16c34a;
}

.orange{
background:#d99900;
}

.red{
background:#ff2b4d;
}

.logs{
margin-top:20px;
}

.logItem{
background:#091738;
padding:10px;
border-radius:15px;
margin-top:10px;
font-size:14px;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>AL Mether</h1>
<p>AI Workforce Management</p>
</div>

<button class="btn managerBtn"
onclick="showManager()">
Yönetici Girişi
</button>

<button class="btn personBtn"
onclick="showPerson()">
Personel Girişi
</button>

<div id="personPanel"
class="card hidden">

<h2>Personel Paneli</h2>

<input
id="personCode"
placeholder="Personel Kodu"
/>

<button
class="btn personBtn"
onclick="loginPerson()">
Giriş Yap
</button>

<div class="breakButtons">

<button
class="b15"
onclick="startBreak(15)">
15 DK
</button>

<button
class="b30"
onclick="startBreak(30)">
30 DK
</button>

<button
class="b45"
onclick="startBreak(45)">
45 DK
</button>

</div>

<button
class="btn managerBtn"
onclick="finishBreak()">
Molayı Bitir
</button>

<button
class="btn exitBtn"
onclick="exitShift()">
Çıkış Yap
</button>

</div>

<div id="managerPanel"
class="card hidden">

<h2>Yönetici Paneli</h2>

<div class="counterArea">

<div class="counter green">
<div id="activeCount">0</div>
<div>Aktif</div>
</div>

<div class="counter orange">
<div id="breakCount">0</div>
<div>Molada</div>
</div>

<div class="counter red">
<div id="exitCount">0</div>
<div>Çıkış</div>
</div>

</div>

<div class="logs"
id="logs"></div>

</div>

</div>

<script>

const STORE = {
lat:38.4237,
lng:27.1428,
radius:120
};

let users =
JSON.parse(localStorage.getItem("users")) || [];

let logs =
JSON.parse(localStorage.getItem("logs")) || [];

function showPerson(){

document
.getElementById("personPanel")
.classList.remove("hidden");

}

function showManager(){

document
.getElementById("managerPanel")
.classList.remove("hidden");

renderLogs();
updateCounters();

}

function createLog(text){

logs.unshift({
text,
time:new Date().toLocaleString()
});

localStorage.setItem(
"logs",
JSON.stringify(logs)
);

renderLogs();

}

function renderLogs(){

const area =
document.getElementById("logs");

area.innerHTML="";

logs.slice(0,20).forEach(log=>{

area.innerHTML += `
<div class="logItem">
${log.text}<br>
<small>${log.time}</small>
</div>
`;

});

}

function updateCounters(){

const active =
users.filter(
u=>u.status==="ACTIVE"
).length;

const breaks =
users.filter(
u=>u.status==="BREAK"
).length;

const exits =
logs.filter(
l=>l.text.includes("Çıkış")
).length;

document
.getElementById("activeCount")
.innerText=active;

document
.getElementById("breakCount")
.innerText=breaks;

document
.getElementById("exitCount")
.innerText=exits;

}

function loginPerson(){

const code =
document
.getElementById("personCode")
.value;

if(!code){

alert("Personel kodu gir");
return;

}

navigator.geolocation
.getCurrentPosition(

(pos)=>{

const userLat =
pos.coords.latitude;

const userLng =
pos.coords.longitude;

const inside =
checkDistance(
userLat,
userLng
);

if(!inside){

createLog(
"⚠️ Şüpheli giriş: " + code
);

alert(
"Mağaza dışında giriş reddedildi"
);

return;

}

users.push({

code,
status:"ACTIVE",
login:new Date()
.toLocaleString()

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"✅ " + code +
" giriş yaptı"
);

updateCounters();

alert("Giriş başarılı");

},

()=>{

alert(
"Konum izni gerekli"
);

}

);

}

function checkDistance(
lat,
lng
){

const distance =
Math.sqrt(
Math.pow(lat-STORE.lat,2)+
Math.pow(lng-STORE.lng,2)
);

return distance < 0.01;

}

function startBreak(min){

const code =
document
.getElementById("personCode")
.value;

const user =
users.find(
u=>u.code===code
);

if(!user){

alert("Personel yok");
return;

}

user.status="BREAK";

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"☕ " + code +
" " + min +
" dk molaya çıktı"
);

updateCounters();

}

function finishBreak(){

const code =
document
.getElementById("personCode")
.value;

const user =
users.find(
u=>u.code===code
);

if(!user){

alert("Personel yok");
return;

}

user.status="ACTIVE";

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"✅ " + code +
" moladan döndü"
);

updateCounters();

}

function exitShift(){

const code =
document
.getElementById("personCode")
.value;

users =
users.filter(
u=>u.code!==code
);

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"👋 " + code +
" çıkış yaptı"
);

updateCounters();

alert("Çıkış yapıldı");

}

updateCounters();

</script>

</body>
</html>
