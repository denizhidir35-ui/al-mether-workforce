<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
AL Mether Workforce AI
</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet"
/>

<script src="https://unpkg.com/html5-qrcode"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
min-height:100vh;
}

.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(
circle at top,
rgba(37,99,235,.35),
transparent 45%
);
z-index:-1;
}

.app{
max-width:700px;
margin:auto;
padding:20px;
padding-bottom:140px;
}

.hidden{
display:none;
}

.header{
text-align:center;
margin-top:40px;
margin-bottom:30px;
}

.header h1{
font-size:62px;
font-weight:800;
color:#38bdf8;
}

.header p{
margin-top:10px;
color:#94a3b8;
font-size:18px;
}

.roleSelect{
display:flex;
flex-direction:column;
gap:18px;
margin-top:40px;
}

.roleBtn{
padding:24px;
border:none;
border-radius:30px;
font-size:22px;
font-weight:800;
color:white;
}

.managerBtn{
background:#2563eb;
}

.employeeBtn{
background:#16a34a;
}

.card{
background:rgba(15,23,42,.84);
border:1px solid rgba(255,255,255,.05);
backdrop-filter:blur(18px);
padding:24px;
border-radius:30px;
margin-bottom:22px;
}

.card h3{
font-size:28px;
margin-bottom:18px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#111827;
color:white;
font-size:16px;
margin-bottom:14px;
outline:none;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:17px;
font-weight:700;
color:white;
margin-top:12px;
}

.blue{
background:#2563eb;
}

.green{
background:#16a34a;
}

.orange{
background:#ca8a04;
}

.red{
background:#dc2626;
}

.gray{
background:#334155;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.stat{
padding:20px;
border-radius:24px;
text-align:center;
}

.stat span{
font-size:14px;
font-weight:700;
}

.stat h2{
margin-top:10px;
font-size:40px;
font-weight:800;
}

.statGreen{
background:#16a34a;
}

.statYellow{
background:#ca8a04;
}

.statRed{
background:#dc2626;
}

.qrBox{
background:#111827;
padding:40px;
border-radius:26px;
text-align:center;
margin-top:16px;
margin-bottom:18px;
}

.qrBox h2{
font-size:44px;
font-weight:800;
color:#38bdf8;
}

.qrBox p{
margin-top:10px;
color:#94a3b8;
}

.actionGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
margin-top:14px;
}

.log{
background:#111827;
padding:18px;
border-radius:22px;
margin-top:14px;
border-left:5px solid #38bdf8;
}

.name{
font-size:18px;
font-weight:700;
color:#38bdf8;
}

.type{
margin-top:8px;
font-weight:600;
}

.time{
margin-top:8px;
font-size:13px;
color:#9ca3af;
}

.badge{
display:inline-block;
padding:8px 12px;
border-radius:14px;
font-size:12px;
font-weight:700;
margin-top:10px;
margin-right:8px;
background:#0f172a;
color:#38bdf8;
}

.aiBox{
background:#111827;
padding:20px;
border-radius:22px;
line-height:1.9;
color:#cbd5e1;
margin-top:18px;
}

.shiftCard{
background:#111827;
padding:18px;
border-radius:22px;
margin-top:14px;
}

.shiftCard h4{
color:#38bdf8;
margin-bottom:10px;
font-size:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.smallBtn{
width:auto;
padding:12px 16px;
margin:0;
background:#ef4444;
}

.welcome{
background:#111827;
padding:20px;
border-radius:24px;
line-height:1.8;
margin-top:18px;
}

.registerText{
margin-top:14px;
text-align:center;
color:#38bdf8;
font-weight:700;
}

#reader{
width:100%;
overflow:hidden;
border-radius:24px;
margin-top:20px;
}

.scanInfo{
margin-top:16px;
background:#111827;
padding:18px;
border-radius:20px;
line-height:1.8;
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- HOME -->

<div id="homeScreen">

<div class="header">

<h1>
AL Mether
</h1>

<p>
AI Workforce Management
</p>

</div>

<div class="roleSelect">

<button
class="roleBtn managerBtn"
onclick="openManager()"
>

Yönetici Girişi

</button>

<button
class="roleBtn employeeBtn"
onclick="openEmployeeLogin()"
>

Personel Girişi

</button>

</div>

</div>

<!-- REGISTER -->

<div
id="registerScreen"
class="hidden"
>

<button
class="gray"
onclick="openEmployeeLogin()"
>

← Geri

</button>

<div class="card">

<h3>
Personel Üyelik
</h3>

<input
type="text"
id="registerCode"
placeholder="Şirket Personel Kodu"
/>

<input
type="text"
id="registerName"
placeholder="Ad Soyad"
/>

<input
type="password"
id="registerPassword"
placeholder="Şifre Oluştur"
/>

<button
class="green"
onclick="registerEmployee()"
>

Üyelik Oluştur

</button>

</div>

</div>

<!-- LOGIN -->

<div
id="employeeLogin"
class="hidden"
>

<button
class="gray"
onclick="goHome()"
>

← Geri

</button>

<div class="card">

<h3>
Personel Giriş
</h3>

<input
type="text"
id="employeeCode"
placeholder="Personel Kodu"
/>

<input
type="password"
id="employeePassword"
placeholder="Şifre"
/>

<button
class="green"
onclick="loginEmployee()"
>

Giriş Yap

</button>

<div
class="registerText"
onclick="openRegister()"
>

Üyelik Oluştur

</div>

</div>

</div>

<!-- EMPLOYEE -->

<div
id="employeePanel"
class="hidden"
>

<button
class="gray"
onclick="logoutEmployee()"
>

← Çıkış Yap

</button>

<div class="card">

<h3>
Mağaza QR Sistemi
</h3>

<div class="qrBox">

<h2>
M085
</h2>

<p>
Tek QR Sistemi Aktif
</p>

</div>

<div
class="welcome"
id="employeeInfo"
>

Hoşgeldiniz

</div>

<div class="actionGrid">

<button
class="blue"
onclick="startAction('İşe Giriş')"
>

İşe Giriş

</button>

<button
class="orange"
onclick="startAction('Mola Çıkış')"
>

Mola Çıkış

</button>

<button
class="green"
onclick="startAction('Mola Giriş')"
>

Mola Giriş

</button>

<button
class="red"
onclick="startAction('Çıkış')"
>

Çıkış

</button>

</div>

<div id="reader"></div>

<div
class="scanInfo"
id="scanInfo"
>

📷 QR okutmak için işlem seçin.

</div>

</div>

</div>

<!-- MANAGER -->

<div
id="managerScreen"
class="hidden"
>

<button
class="gray"
onclick="goHome()"
>

← Geri

</button>

<div class="stats">

<div class="stat statGreen">

<span>
Aktif
</span>

<h2 id="activeCount">
0
</h2>

</div>

<div class="stat statYellow">

<span>
Molada
</span>

<h2 id="breakCount">
0
</h2>

</div>

<div class="stat statRed">

<span>
Çıkış
</span>

<h2 id="exitCount">
0
</h2>

</div>

</div>

<div class="card">

<h3>
Yönetici Paneli
</h3>

<input
type="file"
id="excelFile"
accept=".xlsx,.xls,.png,.jpg,.jpeg"
/>

<div
class="aiBox"
id="aiBox"
>

🤖 AI sistemi hazır.

</div>

<div id="shiftArea"></div>

</div>

<div class="card">

<div class="top">

<h3>
Canlı Hareketler
</h3>

<button
class="smallBtn"
onclick="clearLogs()"
>

Temizle

</button>

</div>

<div id="logArea"></div>

</div>

</div>

</div>

<script>

const COMPANY_QR = "M085";

let currentEmployee = null;

let selectedAction = "";

let qrScanner = null;

let active = 0;
let breakCount = 0;
let exitCount = 0;

const employees =
JSON.parse(
localStorage.getItem(
"almether_users"
)
) || {};

const logs =
JSON.parse(
localStorage.getItem(
"almether_logs"
)
) || [];

const logArea =
document.getElementById(
"logArea"
);

const shiftArea =
document.getElementById(
"shiftArea"
);

logs.forEach(item=>{

renderLog(item);

count(item.type);

});

// screens

function hideAll(){

document.getElementById("homeScreen").classList.add("hidden");
document.getElementById("employeeLogin").classList.add("hidden");
document.getElementById("employeePanel").classList.add("hidden");
document.getElementById("managerScreen").classList.add("hidden");
document.getElementById("registerScreen").classList.add("hidden");

}

function goHome(){

hideAll();

document.getElementById(
"homeScreen"
).classList.remove(
"hidden"
);

}

function openManager(){

hideAll();

document.getElementById(
"managerScreen"
).classList.remove(
"hidden"
);

}

function openEmployeeLogin(){

hideAll();

document.getElementById(
"employeeLogin"
).classList.remove(
"hidden"
);

}

function openRegister(){

hideAll();

document.getElementById(
"registerScreen"
).classList.remove(
"hidden"
);

}

// register

function registerEmployee(){

const code =
document.getElementById(
"registerCode"
).value.trim();

const name =
document.getElementById(
"registerName"
).value.trim();

const password =
document.getElementById(
"registerPassword"
).value.trim();

if(!code || !name || !password){

alert("Bilgileri doldurun");

return;

}

employees[code] = {

name,
password,
store:"M085",
shift:"42 Saat Sistem"

};

localStorage.setItem(

"almether_users",

JSON.stringify(employees)

);

alert("Üyelik oluşturuldu");

openEmployeeLogin();

}

// login

function loginEmployee(){

const code =
document.getElementById(
"employeeCode"
).value.trim();

const password =
document.getElementById(
"employeePassword"
).value.trim();

const emp =
employees[code];

if(!emp){

alert("Personel bulunamadı");

return;

}

if(emp.password !== password){

alert("Şifre yanlış");

return;

}

currentEmployee = {

code,
name:emp.name,
store:emp.store,
shift:emp.shift

};

hideAll();

document.getElementById(
"employeePanel"
).classList.remove(
"hidden"
);

document.getElementById(
"employeeInfo"
).innerHTML =

`
👋 ${emp.name}<br><br>

🏢 Mağaza:
${emp.store}<br>

🤖 Tek QR sistemi aktif<br>

📷 İşlem seçip QR okutun
`;

}

// logout

function logoutEmployee(){

currentEmployee = null;

if(qrScanner){

qrScanner.stop();

}

goHome();

}

// qr action

function startAction(type){

selectedAction = type;

document.getElementById(
"scanInfo"
).innerHTML =

`
📷 Kamera açıldı.<br><br>

İşlem:
${type}<br>

M085 QR okutulmayı bekliyor...
`;

startQR();

}

function startQR(){

if(qrScanner){

qrScanner.stop();

}

qrScanner =
new Html5Qrcode("reader");

qrScanner.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:250
},

(decodedText)=>{

if(decodedText === COMPANY_QR){

saveAction();

document.getElementById(
"scanInfo"
).innerHTML =

`
✅ ${selectedAction} başarılı
`;

qrScanner.stop();

}else{

document.getElementById(
"scanInfo"
).innerHTML =

`
❌ Geçersiz QR
`;

}

},

(error)=>{}

);

}

// save action

function saveAction(){

const now =
new Date();

const item = {

employee:
currentEmployee.name,

code:
currentEmployee.code,

store:
currentEmployee.store,

type:
selectedAction,

time:
now.toLocaleTimeString(
"tr-TR"
),

date:
now.toLocaleDateString(
"tr-TR"
)

};

logs.push(item);

localStorage.setItem(

"almether_logs",

JSON.stringify(logs)

);

renderLog(item);

count(item.type);

}

// render log

function renderLog(item){

const div =
document.createElement(
"div"
);

div.className = "log";

div.innerHTML =

`

<div class="name">

${item.employee}

</div>

<div class="type">

${item.type}

</div>

<div class="time">

${item.date}
•
${item.time}

</div>

<div class="badge">

${item.code}

</div>

<div class="badge">

${item.store}

</div>

`;

logArea.prepend(div);

}

// count

function count(type){

if(type==="İşe Giriş"){

active++;

}

if(type==="Mola Çıkış"){

breakCount++;

}

if(type==="Çıkış"){

exitCount++;

}

document.getElementById(
"activeCount"
).innerText = active;

document.getElementById(
"breakCount"
).innerText = breakCount;

document.getElementById(
"exitCount"
).innerText = exitCount;

}

// clear

function clearLogs(){

localStorage.removeItem(
"almether_logs"
);

logArea.innerHTML="";

active=0;
breakCount=0;
exitCount=0;

document.getElementById(
"activeCount"
).innerText=0;

document.getElementById(
"breakCount"
).innerText=0;

document.getElementById(
"exitCount"
).innerText=0;

}

// file analyze

document
.getElementById(
"excelFile"
)
.addEventListener(
"change",
handleFile
);

function handleFile(e){

const file =
e.target.files[0];

if(!file) return;

document.getElementById(
"aiBox"
).innerHTML =

`
🤖 AI sistemi dosyayı analiz etti.<br><br>

✅ Personeller algılandı<br>

✅ Shift sistemi oluşturuldu<br>

✅ Yoğunluk hesaplandı<br>

✅ 42 saat sistemi uygulandı<br>

✅ M085 mağazası optimize edildi
`;

if(
file.name.includes(".xlsx") ||
file.name.includes(".xls")
){

const reader =
new FileReader();

reader.onload = function(evt){

const data =
new Uint8Array(
evt.target.result
);

const workbook =
XLSX.read(
data,
{
type:'array'
}
);

const sheet =
workbook.Sheets[
workbook.SheetNames[0]
];

const json =
XLSX.utils.sheet_to_json(
sheet
);

showShift(json);

};

reader.readAsArrayBuffer(file);

}else{

fakeAnalyze();

}

}

function fakeAnalyze(){

shiftArea.innerHTML="";

Object.keys(employees).forEach(code=>{

const emp =
employees[code];

const div =
document.createElement(
"div"
);

div.className = "shiftCard";

div.innerHTML =

`

<h4>

${emp.name}

</h4>

<p>

Personel Kodu:
${code}

</p>

<div class="badge">

42 Saat Sistem

</div>

<div class="badge">

2 Gün OFF

</div>

`;

shiftArea.appendChild(div);

});

}

function showShift(data){

shiftArea.innerHTML="";

data.forEach(person=>{

const div =
document.createElement(
"div"
);

div.className = "shiftCard";

div.innerHTML =

`

<h4>

${person["Satıcı DESC"] || "Personel"}

</h4>

<p>

Personel ID:
${person["Satıcı ID"] || "-"}

</p>

<div class="badge">

AI Shift

</div>

<div class="badge">

M085

</div>

`;

shiftArea.appendChild(div);

});

}

</script>

</body>

</html>
