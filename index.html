<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AL Mether Workforce</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#010b2c;
color:white;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
text-align:center;
margin-top:20px;
margin-bottom:25px;
}

.logo h1{
font-size:54px;
color:#36b8ff;
}

.logo p{
color:#9ea7c2;
margin-top:5px;
font-size:20px;
}

.mainBtn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
font-size:26px;
font-weight:bold;
color:white;
margin-top:15px;
}

.managerBtn{
background:#3567ff;
}

.personBtn{
background:#16c84b;
}

.backBtn{
background:#4c556f;
}

.panel{
background:#07153e;
padding:20px;
border-radius:25px;
margin-top:20px;
display:none;
}

.panel h2{
font-size:34px;
margin-bottom:20px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:#08163a;
color:white;
font-size:22px;
margin-top:15px;
}

.loginBtn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:24px;
font-weight:bold;
color:white;
margin-top:18px;
}

.greenBtn{
background:#16c84b;
}

.blueBtn{
background:#3567ff;
}

.redBtn{
background:#ff2b55;
}

.breakArea{
display:flex;
gap:10px;
margin-top:18px;
}

.breakArea button{
flex:1;
padding:15px;
border:none;
border-radius:16px;
font-size:20px;
font-weight:bold;
color:white;
}

.break15{
background:#d39a00;
}

.break30{
background:#ff8c00;
}

.break45{
background:#ff4d4d;
}

.counterArea{
display:flex;
gap:10px;
margin-top:20px;
}

.counter{
flex:1;
padding:20px;
border-radius:20px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.activeBox{
background:#18bf4b;
}

.breakBox{
background:#d79a00;
}

.exitBox{
background:#ff2b55;
}

.logs{
margin-top:20px;
max-height:350px;
overflow:auto;
}

.log{
background:#09183f;
padding:12px;
border-radius:16px;
margin-top:10px;
font-size:15px;
line-height:1.5;
}

.statusBar{
margin-top:15px;
padding:12px;
border-radius:16px;
background:#0c1c49;
font-size:16px;
text-align:center;
color:#9ec5ff;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>AL Mether</h1>
<p>AI Workforce Management</p>
</div>

<div id="homePage">

<button
class="mainBtn managerBtn"
onclick="openManagerLogin()">
Yönetici Girişi
</button>

<button
class="mainBtn personBtn"
onclick="openPersonPanel()">
Personel Girişi
</button>

</div>

<!-- MANAGER LOGIN -->

<div
id="managerLoginPanel"
class="panel">

<h2>Yönetici Girişi</h2>

<input
id="managerCode"
placeholder="Yönetici Kodu"
/>

<input
id="managerPassword"
type="password"
placeholder="Şifre"
/>

<button
class="loginBtn blueBtn"
onclick="managerLogin()">
Giriş Yap
</button>

<button
class="loginBtn backBtn"
onclick="goHome()">
Geri
</button>

</div>

<!-- PERSON PANEL -->

<div
id="personPanel"
class="panel">

<h2>Personel Paneli</h2>

<input
id="personCode"
placeholder="Personel Kodu"
/>

<button
class="loginBtn greenBtn"
onclick="personLogin()">
Giriş Yap
</button>

<div class="breakArea">

<button
class="break15"
onclick="startBreak(15)">
15 DK
</button>

<button
class="break30"
onclick="startBreak(30)">
30 DK
</button>

<button
class="break45"
onclick="startBreak(45)">
45 DK
</button>

</div>

<button
class="loginBtn blueBtn"
onclick="finishBreak()">
Molayı Bitir
</button>

<button
class="loginBtn redBtn"
onclick="exitShift()">
Çıkış Yap
</button>

<button
class="loginBtn backBtn"
onclick="goHome()">
Geri
</button>

<div class="statusBar">
GPS + Güvenlik Sistemi Aktif
</div>

</div>

<!-- MANAGER PANEL -->

<div
id="managerPanel"
class="panel">

<h2>Yönetici Paneli</h2>

<div class="counterArea">

<div class="counter activeBox">
<div id="activeCount">0</div>
<div>Aktif</div>
</div>

<div class="counter breakBox">
<div id="breakCount">0</div>
<div>Molada</div>
</div>

<div class="counter exitBox">
<div id="exitCount">0</div>
<div>Çıkış</div>
</div>

</div>

<div
class="logs"
id="logsArea"></div>

<button
class="loginBtn backBtn"
onclick="goHome()">
Ana Sayfa
</button>

</div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const STORE = {
brand:"SKX",
store:"M085",
lat:38.4237,
lng:27.1428,
radius:0.01
};

const managers = [
{
code:"admin",
password:"1234"
}
];

let users =
JSON.parse(
localStorage.getItem("users")
) || [];

let logs =
JSON.parse(
localStorage.getItem("logs")
) || [];

/* =========================
   UI ENGINE
========================= */

function hideAll(){

document
.getElementById("managerLoginPanel")
.style.display="none";

document
.getElementById("personPanel")
.style.display="none";

document
.getElementById("managerPanel")
.style.display="none";

}

function openManagerLogin(){

hideAll();

document
.getElementById("homePage")
.style.display="none";

document
.getElementById("managerLoginPanel")
.style.display="block";

}

function openPersonPanel(){

hideAll();

document
.getElementById("homePage")
.style.display="none";

document
.getElementById("personPanel")
.style.display="block";

}

function goHome(){

hideAll();

document
.getElementById("homePage")
.style.display="block";

}

/* =========================
   MANAGER AUTH
========================= */

function managerLogin(){

const code =
document
.getElementById("managerCode")
.value;

const password =
document
.getElementById("managerPassword")
.value;

const found =
managers.find(
m =>
m.code === code &&
m.password === password
);

if(!found){

alert(
"Yönetici bilgileri yanlış"
);

return;
}

hideAll();

document
.getElementById("managerPanel")
.style.display="block";

updateCounters();
renderLogs();

}

/* =========================
   LOG SYSTEM
========================= */

function createLog(text){

logs.unshift({

text,
time:new Date()
.toLocaleString()

});

localStorage.setItem(
"logs",
JSON.stringify(logs)
);

renderLogs();

}

function renderLogs(){

const area =
document
.getElementById("logsArea");

if(!area) return;

area.innerHTML="";

logs.slice(0,30)
.forEach(log=>{

area.innerHTML += `
<div class="log">
${log.text}<br>
<small>${log.time}</small>
</div>
`;

});

}

/* =========================
   COUNTERS
========================= */

function updateCounters(){

const active =
users.filter(
u=>u.status==="ACTIVE"
).length;

const breaks =
users.filter(
u=>u.status==="BREAK"
).length;

const exits =
logs.filter(
l=>l.text.includes("çıkış")
).length;

document
.getElementById("activeCount")
.innerText=active;

document
.getElementById("breakCount")
.innerText=breaks;

document
.getElementById("exitCount")
.innerText=exits;

}

/* =========================
   GPS CONTROL
========================= */

function checkLocation(lat,lng){

const distance =
Math.sqrt(
Math.pow(lat-STORE.lat,2)+
Math.pow(lng-STORE.lng,2)
);

return distance < STORE.radius;

}

/* =========================
   PERSON LOGIN
========================= */

function personLogin(){

const code =
document
.getElementById("personCode")
.value;

if(!code){

alert(
"Personel kodu gir"
);

return;
}

navigator
.geolocation
.getCurrentPosition(

(pos)=>{

const lat =
pos.coords.latitude;

const lng =
pos.coords.longitude;

const inside =
checkLocation(lat,lng);

if(!inside){

createLog(
"⚠️ Şüpheli giriş: " +
code
);

alert(
"Mağaza dışında giriş reddedildi"
);

return;
}

const exists =
users.find(
u=>u.code===code
);

if(exists){

alert(
"Bu personel zaten aktif"
);

return;
}

users.push({

code,
status:"ACTIVE",
login:new Date()
.toLocaleString()

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"✅ " +
code +
" giriş yaptı"
);

updateCounters();

alert(
"Giriş başarılı"
);

},

()=>{

alert(
"Konum izni gerekli"
);

}

);

}

/* =========================
   BREAK SYSTEM
========================= */

function startBreak(min){

const code =
document
.getElementById("personCode")
.value;

const user =
users.find(
u=>u.code===code
);

if(!user){

alert(
"Önce giriş yap"
);

return;
}

user.status="BREAK";

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"☕ " +
code +
" " +
min +
" dk molaya çıktı"
);

updateCounters();

alert(
min +
" dk mola başladı"
);

}

function finishBreak(){

const code =
document
.getElementById("personCode")
.value;

const user =
users.find(
u=>u.code===code
);

if(!user){

alert(
"Personel bulunamadı"
);

return;
}

user.status="ACTIVE";

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"✅ " +
code +
" moladan döndü"
);

updateCounters();

alert(
"Mola bitti"
);

}

/* =========================
   EXIT
========================= */

function exitShift(){

const code =
document
.getElementById("personCode")
.value;

users =
users.filter(
u=>u.code!==code
);

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"👋 " +
code +
" çıkış yaptı"
);

updateCounters();

alert(
"Çıkış yapıldı"
);

}

/* =========================
   INIT
========================= */

updateCounters();
renderLogs();

</script>

</body>
</html>
