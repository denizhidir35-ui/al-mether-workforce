<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL Mether Workforce</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#020b2d;
color:white;
padding:15px;
}

.container{
max-width:520px;
margin:auto;
}

.logo{
text-align:center;
margin-top:20px;
margin-bottom:25px;
}

.logo h1{
font-size:50px;
color:#36b8ff;
}

.logo p{
font-size:18px;
color:#98a5c3;
margin-top:5px;
}

.card{
background:#07153d;
padding:20px;
border-radius:24px;
margin-top:20px;
}

.mainBtn,
.loginBtn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
color:white;
margin-top:15px;
}

.blue{
background:#3567ff;
}

.green{
background:#17c84b;
}

.red{
background:#ff2d55;
}

.orange{
background:#ff9500;
}

.purple{
background:#7b3cff;
}

.gray{
background:#4f5974;
}

.panel{
display:none;
}

input,
select{
width:100%;
padding:16px;
border:none;
border-radius:16px;
background:#08163a;
color:white;
font-size:18px;
margin-top:15px;
}

.counterArea{
display:flex;
gap:10px;
margin-top:20px;
}

.counter{
flex:1;
padding:16px;
border-radius:18px;
text-align:center;
font-weight:bold;
}

.activeBox{
background:#17c84b;
}

.breakBox{
background:#ff9500;
}

.exitBox{
background:#ff2d55;
}

.logs{
margin-top:20px;
max-height:320px;
overflow:auto;
}

.log{
background:#09183f;
padding:12px;
border-radius:14px;
margin-top:10px;
font-size:14px;
line-height:1.5;
}

.status{
margin-top:15px;
padding:14px;
background:#0b1d4a;
border-radius:16px;
font-size:14px;
text-align:center;
color:#9cc2ff;
}

.breakArea{
display:flex;
gap:10px;
margin-top:15px;
}

.breakArea button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-weight:bold;
color:white;
font-size:16px;
}

#reader{
width:100%;
margin-top:15px;
overflow:hidden;
border-radius:20px;
display:none;
background:black;
}

.pendingBox{
background:#3d1d1d;
padding:14px;
border-radius:16px;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>AL Mether</h1>
<p>Workforce Platform</p>
</div>

<!-- STORE SELECT -->

<div id="storeSelectPage" class="card">

<h2>Mağaza Seç</h2>

<select id="storeSelect">

<option value="SKX-M085">SKX - M085</option>
<option value="SKX-M086">SKX - M086</option>
<option value="LTB-M201">LTB - M201</option>
<option value="X-M001">X STORE - M001</option>

</select>

<button
class="mainBtn blue"
onclick="saveStore()">
Devam Et
</button>

</div>

<!-- HOME -->

<div id="homePage" class="panel">

<div class="card">

<button
class="mainBtn blue"
onclick="openManagerPanel()">
Yönetici
</button>

<button
class="mainBtn green"
onclick="openPersonPanel()">
Personel
</button>

<button
class="mainBtn purple"
onclick="openRegionPanel()">
Bölge Müdürü
</button>

</div>

</div>

<!-- PERSON PANEL -->

<div id="personPanel" class="panel">

<div class="card">

<h2>Personel Girişi</h2>

<input
id="personCode"
placeholder="Personel Kodu">

<select id="personRole">

<option value="SD">SD</option>
<option value="PARTTIME">Part Time</option>
<option value="MANAGER">Yönetici</option>

</select>

<button
class="loginBtn green"
onclick="startQRScanner()">
QR OKUT
</button>

<div id="reader"></div>

<button
class="loginBtn blue"
onclick="personLogin()">
Giriş Yap
</button>

<div class="breakArea">

<button
class="orange"
onclick="startBreak(15)">
15 DK
</button>

<button
class="orange"
onclick="startBreak(30)">
30 DK
</button>

<button
class="red"
onclick="startBreak(45)">
45 DK
</button>

</div>

<button
class="loginBtn blue"
onclick="finishBreak()">
Molayı Bitir
</button>

<button
class="loginBtn red"
onclick="exitShift()">
Çıkış Yap
</button>

<button
class="loginBtn gray"
onclick="goHome()">
Geri
</button>

<div class="status">
GPS + QR + Güvenlik Sistemi Aktif
</div>

</div>

</div>

<!-- MANAGER PANEL -->

<div id="managerPanel" class="panel">

<div class="card">

<h2>Yönetici Paneli</h2>

<div class="counterArea">

<div class="counter activeBox">
<div id="activeCount">0</div>
<div>Aktif</div>
</div>

<div class="counter breakBox">
<div id="breakCount">0</div>
<div>Molada</div>
</div>

<div class="counter exitBox">
<div id="exitCount">0</div>
<div>Çıkış</div>
</div>

</div>

<div id="pendingArea"></div>

<div
class="logs"
id="logsArea"></div>

<button
class="loginBtn gray"
onclick="goHome()">
Ana Sayfa
</button>

</div>

</div>

<!-- REGION PANEL -->

<div id="regionPanel" class="panel">

<div class="card">

<h2>Bölge Müdürü</h2>

<div
class="logs"
id="regionLogs"></div>

<button
class="loginBtn gray"
onclick="goHome()">
Ana Sayfa
</button>

</div>

</div>

</div>

<script>

/* =========================
DATABASE
========================= */

let users =
JSON.parse(
localStorage.getItem("users")
) || [];

let logs =
JSON.parse(
localStorage.getItem("logs")
) || [];

let pendingApprovals =
JSON.parse(
localStorage.getItem("pendingApprovals")
) || [];

let selectedStore =
localStorage.getItem("selectedStore");

/* =========================
INIT
========================= */

if(selectedStore){

document.getElementById(
"storeSelectPage"
).style.display = "none";

document.getElementById(
"homePage"
).style.display = "block";

}

/* =========================
STORE SAVE
========================= */

function saveStore(){

selectedStore =
document.getElementById(
"storeSelect"
).value;

localStorage.setItem(
"selectedStore",
selectedStore
);

document.getElementById(
"storeSelectPage"
).style.display = "none";

document.getElementById(
"homePage"
).style.display = "block";

}

/* =========================
UI
========================= */

function hideAll(){

document.getElementById(
"homePage"
).style.display = "none";

document.getElementById(
"personPanel"
).style.display = "none";

document.getElementById(
"managerPanel"
).style.display = "none";

document.getElementById(
"regionPanel"
).style.display = "none";

}

function goHome(){

hideAll();

document.getElementById(
"homePage"
).style.display = "block";

}

function openPersonPanel(){

hideAll();

document.getElementById(
"personPanel"
).style.display = "block";

}

function openManagerPanel(){

hideAll();

document.getElementById(
"managerPanel"
).style.display = "block";

updateCounters();
renderLogs();
renderPending();

}

function openRegionPanel(){

hideAll();

document.getElementById(
"regionPanel"
).style.display = "block";

renderRegionLogs();

}

/* =========================
QR ENGINE
========================= */

let qrScanner = null;

function startQRScanner(){

const reader =
document.getElementById(
"reader"
);

reader.style.display = "block";

qrScanner =
new Html5Qrcode("reader");

qrScanner.start(

{
facingMode:"environment"
},

{
fps:10,
qrbox:220
},

(qrCodeMessage)=>{

document.getElementById(
"personCode"
).value =
qrCodeMessage;

createLog(
"🔳 QR okutuldu: " +
qrCodeMessage
);

qrScanner.stop();

reader.style.display =
"none";

},

()=>{}

).catch(()=>{

alert(
"Kamera açılamadı"
);

});

}

/* =========================
LOG ENGINE
========================= */

function createLog(text){

logs.unshift({

store:selectedStore,
text,
time:new Date()
.toLocaleString()

});

localStorage.setItem(
"logs",
JSON.stringify(logs)
);

renderLogs();
renderRegionLogs();

}

/* =========================
COUNTERS
========================= */

function updateCounters(){

document.getElementById(
"activeCount"
).innerText =
users.filter(
u =>
u.store === selectedStore &&
u.status === "ACTIVE"
).length;

document.getElementById(
"breakCount"
).innerText =
users.filter(
u =>
u.store === selectedStore &&
u.status === "BREAK"
).length;

document.getElementById(
"exitCount"
).innerText =
logs.filter(
l =>
l.store === selectedStore &&
l.text.includes("çıkış")
).length;

}

/* =========================
RENDER LOGS
========================= */

function renderLogs(){

const area =
document.getElementById(
"logsArea"
);

area.innerHTML = "";

logs
.filter(
l => l.store === selectedStore
)
.slice(0,30)
.forEach(log=>{

area.innerHTML += `
<div class="log">
🏪 ${log.store}<br>
${log.text}<br>
<small>${log.time}</small>
</div>
`;

});

}

/* =========================
REGION LOGS
========================= */

function renderRegionLogs(){

const area =
document.getElementById(
"regionLogs"
);

area.innerHTML = "";

logs.slice(0,40)
.forEach(log=>{

area.innerHTML += `
<div class="log">
🏪 ${log.store}<br>
${log.text}<br>
<small>${log.time}</small>
</div>
`;

});

}

/* =========================
APPROVAL ENGINE
========================= */

function createPending(text){

pendingApprovals.unshift({

store:selectedStore,
text,
time:new Date()
.toLocaleString()

});

localStorage.setItem(
"pendingApprovals",
JSON.stringify(pendingApprovals)
);

renderPending();

}

function renderPending(){

const area =
document.getElementById(
"pendingArea"
);

area.innerHTML = "";

pendingApprovals
.filter(
p => p.store === selectedStore
)
.slice(0,10)
.forEach((item,index)=>{

area.innerHTML += `
<div class="pendingBox">
⚠️ ${item.text}<br>
<small>${item.time}</small>

<button
class="loginBtn green"
onclick="approvePending(${index})">
Onayla
</button>

<button
class="loginBtn red"
onclick="rejectPending(${index})">
Reddet
</button>

</div>
`;

});

}

function approvePending(index){

pendingApprovals.splice(index,1);

localStorage.setItem(
"pendingApprovals",
JSON.stringify(pendingApprovals)
);

renderPending();

createLog(
"✅ İşlem yönetici tarafından onaylandı"
);

}

function rejectPending(index){

pendingApprovals.splice(index,1);

localStorage.setItem(
"pendingApprovals",
JSON.stringify(pendingApprovals)
);

renderPending();

createLog(
"❌ İşlem reddedildi"
);

}

/* =========================
PERSON LOGIN
========================= */

function personLogin(){

const code =
document.getElementById(
"personCode"
).value;

const role =
document.getElementById(
"personRole"
).value;

if(!code){

alert(
"Personel kodu gerekli"
);

return;

}

const exists =
users.find(
u =>
u.code === code &&
u.store === selectedStore
);

if(exists){

createPending(
"Çoklu giriş denemesi: " +
code
);

alert(
"Yönetici onayı gerekiyor"
);

return;

}

users.push({

code,
role,
store:selectedStore,
status:"ACTIVE"

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"✅ " +
code +
" giriş yaptı (" +
role +
")"
);

updateCounters();

alert(
"Giriş başarılı"
);

}

/* =========================
BREAK
========================= */

function startBreak(min){

const code =
document.getElementById(
"personCode"
).value;

const user =
users.find(
u =>
u.code === code &&
u.store === selectedStore
);

if(!user){

alert(
"Önce giriş yap"
);

return;

}

user.status = "BREAK";

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"☕ " +
code +
" " +
min +
" dk molaya çıktı"
);

updateCounters();

}

/* =========================
FINISH BREAK
========================= */

function finishBreak(){

const code =
document.getElementById(
"personCode"
).value;

const user =
users.find(
u =>
u.code === code &&
u.store === selectedStore
);

if(!user){

alert(
"Personel bulunamadı"
);

return;

}

user.status = "ACTIVE";

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"✅ " +
code +
" moladan döndü"
);

updateCounters();

}

/* =========================
EXIT
========================= */

function exitShift(){

const code =
document.getElementById(
"personCode"
).value;

users =
users.filter(
u =>
!(
u.code === code &&
u.store === selectedStore
)
);

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"👋 " +
code +
" çıkış yaptı"
);

updateCounters();

}

/* =========================
INIT
========================= */

updateCounters();
renderLogs();

</script>

</body>
</html>
