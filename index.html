<script>

/* =========================
DATABASE
========================= */

let users =
JSON.parse(
localStorage.getItem("users")
) || [];

let logs =
JSON.parse(
localStorage.getItem("logs")
) || [];

let pendingApprovals =
JSON.parse(
localStorage.getItem("pendingApprovals")
) || [];

let selectedStore =
localStorage.getItem("selectedStore");

/* =========================
MASTER ACCOUNT
========================= */

const MASTER_CODE =
"9-9-999";

const MASTER_PASSWORD =
"1234";

/* =========================
MANAGERS
========================= */

const managers = [

{
code:"M085-ADMIN",
password:"1234",
store:"SKX-M085"
},

{
code:"M086-ADMIN",
password:"1234",
store:"SKX-M086"
},

{
code:"LTB-ADMIN",
password:"1234",
store:"LTB-M201"
}

];

/* =========================
QR STATE
========================= */

let qrScanner = null;

let qrRunning = false;

let qrProcessed = false;

/* =========================
ACTION
========================= */

let currentAction = "LOGIN";

let selectedBreak = 15;

/* =========================
UI HELPERS
========================= */

function hideAll(){

const panels = [

"homePage",
"personPanel",
"managerPanel",
"regionPanel",
"managerLoginPanel",
"regionLoginPanel"

];

panels.forEach(id=>{

const el =
document.getElementById(id);

if(el){

el.style.display = "none";

}

});

}

function goHome(){

hideAll();

const home =
document.getElementById(
"homePage"
);

if(home){

home.style.display = "block";

}

stopScanner();

}

/* =========================
ACTION ENGINE
========================= */

function setAction(action){

currentAction = action;

const loginBtn =
document.getElementById(
"loginAction"
);

const breakBtn =
document.getElementById(
"breakAction"
);

const exitBtn =
document.getElementById(
"exitAction"
);

if(loginBtn)
loginBtn.classList.remove(
"selectedAction"
);

if(breakBtn)
breakBtn.classList.remove(
"selectedAction"
);

if(exitBtn)
exitBtn.classList.remove(
"selectedAction"
);

if(action==="LOGIN" && loginBtn){

loginBtn.classList.add(
"selectedAction"
);

}

if(action==="BREAK" && breakBtn){

breakBtn.classList.add(
"selectedAction"
);

}

if(action==="EXIT" && exitBtn){

exitBtn.classList.add(
"selectedAction"
);

}

}

function setBreakTime(min){

selectedBreak = min;

}

/* =========================
LOG ENGINE
========================= */

function createLog(text){

logs.unshift({

store:selectedStore,
text,
time:new Date()
.toLocaleString()

});

localStorage.setItem(
"logs",
JSON.stringify(logs)
);

renderLogs();
renderRegionLogs();

}

/* =========================
PENDING ENGINE
========================= */

function createPending(text){

pendingApprovals.unshift({

store:selectedStore,
text,
time:new Date()
.toLocaleString()

});

localStorage.setItem(

"pendingApprovals",

JSON.stringify(
pendingApprovals
)

);

renderPending();

}

function renderPending(){

const area =
document.getElementById(
"pendingArea"
);

if(!area) return;

area.innerHTML = "";

pendingApprovals
.filter(
p=>p.store===selectedStore
)
.slice(0,10)
.forEach((item,index)=>{

area.innerHTML += `

<div class="pendingBox">

⚠️ ${item.text}<br>

<small>
${item.time}
</small>

<button
class="loginBtn green"
onclick="approvePending(${index})">
Onayla
</button>

<button
class="loginBtn red"
onclick="rejectPending(${index})">
Reddet
</button>

</div>

`;

});

}

function approvePending(index){

pendingApprovals.splice(index,1);

localStorage.setItem(

"pendingApprovals",

JSON.stringify(
pendingApprovals
)

);

renderPending();

createLog(
"✅ Yönetici işlem onayladı"
);

}

function rejectPending(index){

pendingApprovals.splice(index,1);

localStorage.setItem(

"pendingApprovals",

JSON.stringify(
pendingApprovals
)

);

renderPending();

createLog(
"❌ Yönetici işlem reddetti"
);

}

/* =========================
MANAGER LOGIN
========================= */

function managerLogin(){

const code =
document.getElementById(
"managerCode"
).value;

const password =
document.getElementById(
"managerPassword"
).value;

const manager =
managers.find(
m =>
m.code===code &&
m.password===password
);

if(!manager){

alert(
"Yönetici bilgileri yanlış"
);

return;

}

if(
manager.store !== selectedStore
){

alert(
"Bu mağaza için yetkiniz yok"
);

return;

}

hideAll();

const panel =
document.getElementById(
"managerPanel"
);

if(panel){

panel.style.display =
"block";

}

const storeLabel =
document.getElementById(
"managerStore"
);

if(storeLabel){

storeLabel.innerText =
selectedStore;

}

updateCounters();
renderLogs();
renderPending();

createLog(
"🔐 Yönetici giriş yaptı"
);

}

/* =========================
MASTER LOGIN
========================= */

function regionLogin(){

const code =
document.getElementById(
"regionCode"
).value;

const password =
document.getElementById(
"regionPassword"
).value;

if(
code !== MASTER_CODE ||
password !== MASTER_PASSWORD
){

alert(
"Erişim reddedildi"
);

return;

}

hideAll();

const panel =
document.getElementById(
"regionPanel"
);

if(panel){

panel.style.display =
"block";

}

renderRegionLogs();

createLog(
"🌍 MASTER ACCESS"
);

}

/* =========================
STOP QR
========================= */

async function stopScanner(){

try{

if(qrScanner){

await qrScanner.stop();

await qrScanner.clear();

qrScanner = null;

}

}catch(e){}

const reader =
document.getElementById(
"reader"
);

if(reader){

reader.innerHTML = "";

reader.style.display =
"none";

}

qrRunning = false;

qrProcessed = false;

}

/* =========================
START QR
========================= */

async function startQRScanner(){

if(qrRunning){

return;

}

const code =
document.getElementById(
"personCode"
).value;

if(!code){

alert(
"Personel kodu gerekli"
);

return;

}

await stopScanner();

qrRunning = true;

const reader =
document.getElementById(
"reader"
);

if(reader){

reader.innerHTML = "";

reader.style.display =
"block";

}

qrScanner =
new Html5Qrcode("reader");

try{

await qrScanner.start(

{
facingMode:"environment"
},

{
fps:5,
qrbox:200
},

async(decodedText)=>{

if(qrProcessed){

return;

}

qrProcessed = true;

await stopScanner();

if(
decodedText !==
"STORE:" + selectedStore
){

createPending(
"Yanlış mağaza QR okutuldu"
);

alert(
"Geçersiz QR"
);

return;

}

processAction(code);

},

()=>{}

);

}catch(e){

await stopScanner();

alert(
"Kamera açılamadı"
);

}

}

/* =========================
PROCESS ACTION
========================= */

function processAction(code){

const user =
users.find(
u =>
u.code===code &&
u.store===selectedStore
);

/* LOGIN */

if(currentAction==="LOGIN"){

if(user){

createPending(
"Çoklu giriş denemesi: " +
code
);

alert(
"Yönetici onayı gerekiyor"
);

return;

}

users.push({

code,
role:"PERSONNEL",
store:selectedStore,
status:"ACTIVE"

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"✅ " +
code +
" giriş yaptı"
);

updateCounters();

alert(
"Giriş başarılı"
);

}

/* BREAK */

if(currentAction==="BREAK"){

if(!user){

createPending(
"Girişsiz mola denemesi: " +
code
);

alert(
"Yönetici onayı gerekiyor"
);

return;

}

user.status = "BREAK";

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"☕ " +
code +
" " +
selectedBreak +
" dk molaya çıktı"
);

updateCounters();

alert(
"Mola başlatıldı"
);

}

/* EXIT */

if(currentAction==="EXIT"){

if(!user){

createPending(
"Geçersiz çıkış denemesi: " +
code
);

alert(
"Yönetici onayı gerekiyor"
);

return;

}

users =
users.filter(
u =>
!(
u.code===code &&
u.store===selectedStore
)
);

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"👋 " +
code +
" çıkış yaptı"
);

updateCounters();

alert(
"Çıkış başarılı"
);

}

}

/* =========================
COUNTERS
========================= */

function updateCounters(){

const active =
users.filter(
u =>
u.store===selectedStore &&
u.status==="ACTIVE"
).length;

const breaks =
users.filter(
u =>
u.store===selectedStore &&
u.status==="BREAK"
).length;

const exits =
logs.filter(
l =>
l.store===selectedStore &&
l.text.includes("çıkış")
).length;

const activeEl =
document.getElementById(
"activeCount"
);

const breakEl =
document.getElementById(
"breakCount"
);

const exitEl =
document.getElementById(
"exitCount"
);

if(activeEl)
activeEl.innerText = active;

if(breakEl)
breakEl.innerText = breaks;

if(exitEl)
exitEl.innerText = exits;

}

/* =========================
RENDER LOGS
========================= */

function renderLogs(){

const area =
document.getElementById(
"logsArea"
);

if(!area) return;

area.innerHTML = "";

logs
.filter(
l=>l.store===selectedStore
)
.slice(0,30)
.forEach(log=>{

area.innerHTML += `

<div class="log">

🏪 ${log.store}<br>

${log.text}<br>

<small>
${log.time}
</small>

</div>

`;

});

}

function renderRegionLogs(){

const area =
document.getElementById(
"regionLogs"
);

if(!area) return;

area.innerHTML = "";

logs
.slice(0,50)
.forEach(log=>{

area.innerHTML += `

<div class="log">

🏪 ${log.store}<br>

${log.text}<br>

<small>
${log.time}
</small>

</div>

`;

});

}

/* =========================
INIT
========================= */

updateCounters();
renderLogs();

</script>
