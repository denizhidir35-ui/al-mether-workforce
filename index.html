<script>

/* =========================
DATABASE
========================= */

let users =
JSON.parse(
localStorage.getItem("users")
) || [];

let logs =
JSON.parse(
localStorage.getItem("logs")
) || [];

let pendingApprovals =
JSON.parse(
localStorage.getItem("pendingApprovals")
) || [];

let selectedStore =
localStorage.getItem("selectedStore");

/* =========================
PERSONNEL DATABASE
========================= */

let personnelDatabase =
JSON.parse(
localStorage.getItem(
"personnelDatabase"
)
) || [

/* MASTER */

{
code:"9-9-999",
password:"1234",
role:"MASTER",
store:"ALL",
active:true
},

/* MANAGERS */

{
code:"M085-ADMIN",
password:"1234",
role:"MANAGER",
store:"SKX-M085",
active:true
},

{
code:"M086-ADMIN",
password:"1234",
role:"MANAGER",
store:"SKX-M086",
active:true
},

{
code:"LTB-ADMIN",
password:"1234",
role:"MANAGER",
store:"LTB-M201",
active:true
},

/* PERSONNEL */

{
code:"1-8-350",
password:"1234",
role:"MANAGER",
store:"SKX-M085",
active:true
}

];

localStorage.setItem(
"personnelDatabase",
JSON.stringify(
personnelDatabase
)
);

/* =========================
QR STATE
========================= */

let qrScanner = null;

let qrRunning = false;

let qrProcessed = false;

/* =========================
ACTION
========================= */

let currentAction = "LOGIN";

let selectedBreak = 15;

/* =========================
FIND PERSONNEL
========================= */

function findPersonnel(
code
){

return personnelDatabase.find(
p =>
p.code === code
);

}

/* =========================
VALIDATE PERSONNEL
========================= */

function validatePersonnel(
code,
password
){

const person =
personnelDatabase.find(
p =>
p.code === code &&
p.password === password &&
p.active === true
);

return person;

}

/* =========================
ADD PERSONNEL
========================= */

function addPersonnel(
code,
password,
role,
store
){

const exists =
personnelDatabase.find(
p => p.code === code
);

if(exists){

alert(
"Bu personel mevcut"
);

return;

}

personnelDatabase.push({

code,
password,
role,
store,
active:true

});

localStorage.setItem(

"personnelDatabase",

JSON.stringify(
personnelDatabase
)

);

createLog(

"➕ Personel eklendi: " +
code

);

}

/* =========================
PASSIVE PERSONNEL
========================= */

function passivePersonnel(
code
){

const person =
personnelDatabase.find(
p => p.code === code
);

if(!person){

return;

}

person.active = false;

localStorage.setItem(

"personnelDatabase",

JSON.stringify(
personnelDatabase
)

);

createLog(

"⛔ Personel pasif: " +
code

);

}

/* =========================
RESET PASSWORD
========================= */

function resetPassword(
code,
newPassword
){

const person =
personnelDatabase.find(
p => p.code === code
);

if(!person){

return;

}

person.password =
newPassword;

localStorage.setItem(

"personnelDatabase",

JSON.stringify(
personnelDatabase
)

);

createLog(

"🔑 Şifre reset: " +
code

);

}

/* =========================
GET STORE PERSONNEL
========================= */

function getStorePersonnel(){

return personnelDatabase.filter(

p =>
p.store === selectedStore

);

}

/* =========================
MANAGER LOGIN
========================= */

function managerLogin(){

const code =
document.getElementById(
"managerCode"
).value;

const password =
document.getElementById(
"managerPassword"
).value;

const manager =
validatePersonnel(
code,
password
);

if(!manager){

alert(
"Yönetici bilgileri yanlış"
);

return;

}

if(
manager.role !== "MANAGER" &&
manager.role !== "MASTER"
){

alert(
"Yetkisiz erişim"
);

return;

}

if(
manager.store !== selectedStore &&
manager.role !== "MASTER"
){

alert(
"Bu mağaza için yetkiniz yok"
);

return;

}

hideAll();

document.getElementById(
"managerPanel"
).style.display = "block";

document.getElementById(
"managerStore"
).innerText =
selectedStore;

updateCounters();
renderLogs();
renderPending();

createLog(
"🔐 Yönetici giriş yaptı"
);

}

/* =========================
REGION LOGIN
========================= */

function regionLogin(){

const code =
document.getElementById(
"regionCode"
).value;

const password =
document.getElementById(
"regionPassword"
).value;

const region =
validatePersonnel(
code,
password
);

if(!region){

alert(
"Erişim reddedildi"
);

return;

}

if(
region.role !== "MASTER"
){

alert(
"MASTER yetkisi gerekli"
);

return;

}

hideAll();

document.getElementById(
"regionPanel"
).style.display = "block";

renderRegionLogs();

createLog(
"🌍 MASTER ACCESS"
);

}

/* =========================
PROCESS ACTION
========================= */

function processAction(code){

const person =
findPersonnel(code);

if(!person){

createPending(
"Bilinmeyen personel: " +
code
);

alert(
"Personel bulunamadı"
);

return;

}

if(
person.store !== selectedStore &&
person.role !== "MASTER"
){

createPending(
"Yanlış mağaza personeli: " +
code
);

alert(
"Bu mağaza için yetkisiz"
);

return;

}

const user =
users.find(
u =>
u.code===code &&
u.store===selectedStore
);

/* LOGIN */

if(currentAction==="LOGIN"){

if(user){

createPending(
"Çoklu giriş denemesi: " +
code
);

alert(
"Yönetici onayı gerekiyor"
);

return;

}

users.push({

code,
role:person.role,
store:selectedStore,
status:"ACTIVE"

});

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"✅ " +
code +
" giriş yaptı (" +
person.role +
")"
);

updateCounters();

alert(
"Giriş başarılı"
);

}

/* BREAK */

if(currentAction==="BREAK"){

if(!user){

createPending(
"Girişsiz mola denemesi: " +
code
);

alert(
"Yönetici onayı gerekiyor"
);

return;

}

user.status = "BREAK";

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"☕ " +
code +
" " +
selectedBreak +
" dk molaya çıktı"
);

updateCounters();

alert(
"Mola başlatıldı"
);

}

/* EXIT */

if(currentAction==="EXIT"){

if(!user){

createPending(
"Geçersiz çıkış denemesi: " +
code
);

alert(
"Yönetici onayı gerekiyor"
);

return;

}

users =
users.filter(
u =>
!(
u.code===code &&
u.store===selectedStore
)
);

localStorage.setItem(
"users",
JSON.stringify(users)
);

createLog(
"👋 " +
code +
" çıkış yaptı"
);

updateCounters();

alert(
"Çıkış başarılı"
);

}

}

</script>
